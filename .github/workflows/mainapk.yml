name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Create Android project structure
        run: |
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res
          mkdir -p android/app/src/main/java/com/onbus/app
          
      - name: Copy web files to Android assets
        run: |
          # सारी HTML/CSS/JS फाइलें assets में कॉपी करें
          cp -r *.html android/app/src/main/assets/ 2>/dev/null || :
          cp -r *.css android/app/src/main/assets/ 2>/dev/null || :
          cp -r *.js android/app/src/main/assets/ 2>/dev/null || :
          cp -r images android/app/src/main/assets/ 2>/dev/null || :
          
      - name: Create AndroidManifest.xml
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.onbus.app">
              
              <uses-permission android:name="android.permission.INTERNET" />
              
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="orientation|screenSize"
                      android:label="@string/app_name"
                      android:theme="@style/AppTheme"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
      - name: Create MainActivity.java
        run: |
          cat > android/app/src/main/java/com/onbus/app/MainActivity.java << 'EOF'
          package com.onbus.app;
          
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import androidx.appcompat.app.AppCompatActivity;
          
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  webView = new WebView(this);
                  setContentView(webView);
                  
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setLoadWithOverviewMode(true);
                  webSettings.setUseWideViewPort(true);
                  webSettings.setBuiltInZoomControls(true);
                  webSettings.setDisplayZoomControls(false);
                  
                  webView.setWebViewClient(new WebViewClient());
                  
                  // Load your HTML file
                  webView.loadUrl("file:///android_asset/index.html");
              }
              
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF
          
      - name: Create resource files
        run: |
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">ON BUS</string>
          </resources>
          EOF
          
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">#7c3aed</item>
                  <item name="colorPrimaryDark">#6d28d9</item>
                  <item name="colorAccent">#a78bfa</item>
              </style>
          </resources>
          EOF
          
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Create gradle files
        run: |
          # Create settings.gradle
          cat > android/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ONBUS"
          include ':app'
          EOF
          
          # Create build.gradle (project level)
          cat > android/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF
          
          # Create build.gradle (app level)
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          
          android {
              namespace 'com.onbus.app'
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.onbus.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
              implementation 'androidx.webkit:webkit:1.8.0'
          }
          EOF
          
          # Create proguard file
          cat > android/app/proguard-rules.pro << 'EOF'
          # Add project specific ProGuard rules here.
          EOF
          
          # Create gradle wrapper
          mkdir -p android/gradle/wrapper
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          cd android
          chmod +x gradlew
          
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: on-bus-app
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
